aid: pacer-case-locator-pcl-
name: PACER Case Locator (PCL)
description: >-
  The PACER Case Locator (PCL) is a nationwide index of federal court cases.
  The public PCL API allows users to programmatically search the PCL for
  federal cases across U.S. district, bankruptcy, and appellate courts using
  the same search functionality and dataset as the PCL web application.
